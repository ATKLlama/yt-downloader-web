<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama's Video Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; }
    body { height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#0f172a,#1e293b); color:white; }
    .container { width:100%; max-width:420px; background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
    h1 { font-size:22px; margin-bottom:6px; }
    p.subtitle { font-size:13px; opacity:0.7; margin-bottom:20px; }
    input, select { width:100%; padding:12px; margin-bottom:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color:white; outline:none; }
    button { width:100%; padding:12px; border:none; border-radius:10px; background: linear-gradient(90deg,#3b82f6,#8b5cf6); color:white; font-weight:600; cursor:pointer; transition:0.2s; }
    button:hover { transform:scale(1.02); }
    button:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    #status { margin-top:12px; font-size:13px; text-align:center; opacity:0.8; }
    .loading { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-radius:50%; border-top-color:transparent; animation: spin 0.8s linear infinite; margin-right:6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color:#22c55e; }
    .error { color:#ef4444; }
</style>
</head>
<body>
<div class="container">
    <h1>Llama's Video Downloader</h1>
    <p class="subtitle">Download videos or audio instantly</p>

    <form id="downloadForm">
        <input type="text" id="url" placeholder="Paste YouTube URL..." required>
        <select id="format">
            <option value="mp4">MP4 Video</option>
            <option value="mp3">MP3 Audio</option>
        </select>
        <button id="btn" type="submit">Download</button>
    </form>

    <p id="status"></p>
</div>

<script>
const form = document.getElementById('downloadForm');
const status = document.getElementById('status');
const btn = document.getElementById('btn');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('url').value.trim();
    const format = document.getElementById('format').value;

    btn.disabled = true;
    status.innerHTML = `<span class="loading"></span>Processing...`;
    status.className = "";

    try {
        const response = await fetch('https://yt-downloader-web-sea7.onrender.com/download', {
            method: 'POST',
            body: new URLSearchParams({ url, format }),
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || "Download failed");
        }

        const blob = await response.blob();
        let filename = `download.${format}`;
        const disposition = response.headers.get('Content-Disposition');

        if (disposition && disposition.includes('filename=')) {
            filename = disposition.split('filename=')[1].replace(/"/g, '');
        }

        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();

        status.textContent = "Download complete!";
        status.className = "success";

    } catch (err) {
        status.textContent = "Error: " + err.message;
        status.className = "error";
    } finally {
        btn.disabled = false;
    }
});
</script>

</body>
</html>
